worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  access_log /dev/stdout;

  # Frontend: serve the built SPA on :5173.
  # /api/* is reverse-proxied to the FastAPI BFF on localhost:8010, so the
  # browser never makes a cross-origin call.
  server {
    listen 5173 default_server;
    server_name _;

    root /app/static;
    index index.html;

    # Allow large request bodies (helps with auth cookies + future file uploads).
    client_max_body_size 10m;

    # Backend proxy — same-origin from the browser's POV.
    location /api/ {
      proxy_pass http://127.0.0.1:8010;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Pass cookies straight through — the BFF reads _eftf_session from them.
      proxy_pass_request_headers on;
      # Don't buffer streaming responses (status polls, future SSE).
      proxy_buffering off;
      proxy_read_timeout 60s;
    }

    # Hashed Vite assets — long-cache because filenames carry content hashes.
    location /assets/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback: every unmatched path returns index.html so client routes
    # like /prep/$applicationId/gap-report deep-link cleanly on hard reload.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
